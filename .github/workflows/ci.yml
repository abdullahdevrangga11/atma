name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Foundry tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: forge --version
        run: forge --version

      - name: forge build
        run: forge build --sizes

      - name: forge test
        run: forge test -vvv

  frontend:
    name: Frontend (lint + typecheck + agent tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint || true # eslint warnings are non-blocking on the hackathon branch

      - name: Agent unit tests
        run: pnpm test:agents

      - name: Build
        run: pnpm build
        env:
          # Build needs to succeed without secrets — server-side env vars are read lazily.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-placeholder' }}
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID || 'placeholder' }}
